spring.application.name=trekking-ecommerce
# Perfil por defecto para facilitar desarrollo local en cualquier SO
spring.profiles.default=local
# JPA / Hibernate
spring.jpa.open-in-view=false
logging.level.com.trekking=INFO
# App
server.port=${SERVER_PORT:8080}
# Consola H2 desactivada por defecto (se habilita en perfil local)
spring.h2.console.enabled=false
# JWT
jwt.secret=${JWT_SECRET:ClaveSecretaTrekkingEcommerce2024MuyLarga}
jwt.expiration=86400000
# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Subida de fotos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB