spring.application.name=ecommerce
# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/trekking_ecommerce\
  ?createDatabaseIfNotExist=true&useSSL=false\
  &serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=TU_PASSWORD_AQUI
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
# App
spring.application.name=trekking-ecommerce
server.port=8080
# JWT
jwt.secret=ClaveSecretaTrekkingEcommerce2024MuyLarga
jwt.expiration=86400000
# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Subida de fotos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB