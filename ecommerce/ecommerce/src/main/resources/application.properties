spring.application.name=trekking-ecommerce
# Base de datos
# IMPORTANTE: reemplazar TU_PASSWORD_AQUI con la contraseña de tu MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/trekking_ecommerce?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA / Hibernate
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dialect omitido: Hibernate 6 (Spring Boot 3) lo detecta automáticamente desde la URL
# App
server.port=8080
# JWT
jwt.secret=ClaveSecretaTrekkingEcommerce2024MuyLarga
jwt.expiration=86400000
# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# Subida de fotos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB